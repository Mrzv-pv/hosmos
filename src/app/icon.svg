<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="planet" cx="40%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#5B9CF6"/>
      <stop offset="35%" stop-color="#1E6FD9"/>
      <stop offset="70%" stop-color="#6B3FA0"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </radialGradient>
    <radialGradient id="spec" cx="32%" cy="30%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#1E6FD9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#1E6FD9" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6B3FA0" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#5B9CF6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9B6FD4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- planet body -->
  <circle cx="16" cy="16" r="10" fill="url(#planet)"/>
  <!-- specular highlight -->
  <circle cx="16" cy="16" r="10" fill="url(#spec)"/>
  <!-- ring behind (top half of ellipse) -->
  <ellipse cx="16" cy="16" rx="15" ry="4.5" fill="none" stroke="url(#ring)" stroke-width="2.2" stroke-dasharray="0 24 23 0" opacity="0.5"/>
  <!-- planet body again to cover ring behind -->
  <circle cx="16" cy="16" r="10" fill="url(#planet)"/>
  <circle cx="16" cy="16" r="10" fill="url(#spec)"/>
  <!-- ring front (bottom half of ellipse) -->
  <path d="M 1 16 A 15 4.5 0 0 0 31 16" fill="none" stroke="url(#ring)" stroke-width="2.2" opacity="0.85"/>
  <!-- subtle border -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="white" stroke-width="0.4" opacity="0.25"/>
</svg>
